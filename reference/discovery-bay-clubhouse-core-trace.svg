<svg viewBox="0 0 1300 860" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <style>
      .spine { stroke:#ffffff; stroke-width:12; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .road  { stroke:#f6f1e4; stroke-width:8;  fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .court { stroke:#f6f1e4; stroke-width:6;  fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .rlbl  { fill:#3a3a3a; font-size:13px; font-style:italic; }
      .rlblb { fill:#20323c; font-size:15px; font-weight:bold; }
      .lot   { stroke:#b9834e; stroke-width:2; }
    </style>
  </defs>

  <!-- land base -->
  <rect x="0" y="0" width="1300" height="860" fill="#d9d0ac"/>

  <!-- ===== GOLF FAIRWAYS (green ribbons) ===== -->
  <g fill="#82b25c" opacity="0.95">
    <path d="M250,120 C420,90 560,140 640,240 C720,340 560,380 470,320 C380,260 300,240 250,300 Z"/>
    <path d="M640,150 C760,120 900,150 980,120 L1030,220 C930,260 780,250 690,300 C620,260 620,200 640,150 Z"/>
    <path d="M470,430 C620,400 820,410 980,470 C1080,510 1080,620 980,660 C820,700 620,690 500,640 C430,570 420,480 470,430 Z"/>
    <path d="M250,500 C360,470 430,520 420,600 C410,690 300,700 240,650 C190,600 200,540 250,500 Z"/>
    <path d="M620,700 C760,670 900,690 1010,720 C960,800 800,810 660,790 C620,760 610,730 620,700 Z"/>
  </g>

  <!-- ===== WATER (lagoons + golf ponds) ===== -->
  <g fill="#5199bd">
    <path d="M150,250 C230,240 250,330 180,380 C120,420 120,300 150,250 Z"/>
    <ellipse cx="560" cy="470" rx="70" ry="34"/>
    <ellipse cx="760" cy="540" rx="55" ry="28"/>
    <path d="M330,560 C420,540 430,640 350,690 C280,730 250,640 330,560 Z"/>
    <path d="M1040,300 C1120,290 1130,380 1060,420 C1000,450 990,340 1040,300 Z"/>
    <ellipse cx="900" cy="600" rx="48" ry="24"/>
    <path d="M640,640 C720,620 740,700 670,740 C610,770 590,680 640,640 Z"/>
    <ellipse cx="1200" cy="700" rx="42" ry="60"/>
  </g>

  <!-- ===== ROADS ===== -->
  <!-- Discovery Bay Blvd: west spine -->
  <path class="spine" d="M120,40 L120,800"/>
  <!-- Clubhouse Dr: the main loop through the core -->
  <path class="spine" d="M120,390
                         C230,400 320,400 400,440
                         C500,490 570,520 660,525
                         C760,530 830,505 870,450
                         C905,400 925,320 930,220
                         C933,150 930,90 928,40"/>
  <!-- Clubhouse Dr south continuation to east -->
  <path class="road" d="M660,525 C740,545 820,545 900,520 C980,495 1030,470 1090,430"/>
  <!-- St Andrews Dr (NW diagonal) -->
  <path class="road" d="M330,40 C325,140 320,230 350,300 C370,350 390,390 400,440"/>
  <!-- Cherry Hills Dr (east spine) -->
  <path class="spine" d="M1160,260 C1155,420 1160,560 1150,720"/>
  <!-- connectors east -->
  <path class="road" d="M1090,430 C1120,400 1140,360 1160,320"/>
  <path class="road" d="M1030,470 C1080,540 1110,620 1150,690"/>

  <!-- ===== CUL-DE-SAC COURTS (labeled stubs) ===== -->
  <g class="court">
    <path d="M345,60 C345,110 360,150 380,180"/>            <!-- Emerald Ct -->
    <path d="M500,150 C495,220 500,300 470,320"/>           <!-- Fairway Ct -->
    <path d="M400,440 C420,400 430,370 420,340"/>           <!-- Hampton Ct -->
    <path d="M300,470 C300,540 320,600 350,640"/>           <!-- St Andrews Ct -->
    <path d="M880,120 C860,170 870,210 900,240"/>           <!-- Augusta Ct -->
    <path d="M1020,110 C1010,170 1015,220 980,250"/>        <!-- Oakmont Ct -->
    <path d="M910,300 C880,330 860,360 870,400"/>           <!-- Gateway Ct -->
    <path d="M1030,290 C1080,300 1120,300 1150,320"/>       <!-- Greenfield Way -->
    <path d="M830,540 C820,600 840,660 870,700"/>           <!-- Pinehurst Ct -->
    <path d="M1030,560 C1035,630 1030,700 1010,750"/>       <!-- Prestwick Dr -->
    <path d="M650,540 C645,620 660,700 690,760"/>           <!-- Wayfarer Ct -->
    <path d="M585,700 C560,740 545,780 560,820"/>           <!-- Azure Ct -->
  </g>

  <!-- ===== HOUSE-LOT TICKS (suggested, along a couple of courts) ===== -->
  <g class="lot">
    <line x1="470" y1="150" x2="470" y2="130"/><line x1="452" y1="165" x2="448" y2="145"/>
    <line x1="530" y1="150" x2="530" y2="130"/><line x1="548" y1="165" x2="552" y2="145"/>
    <line x1="290" y1="500" x2="270" y2="495"/><line x1="292" y1="540" x2="272" y2="537"/>
    <line x1="330" y1="500" x2="345" y2="490"/><line x1="335" y1="545" x2="352" y2="537"/>
  </g>

  <!-- ===== CLUBHOUSE + PARKING ===== -->
  <rect x="760" y="470" width="70" height="42" fill="#b06a3a" stroke="#fff" stroke-width="2"/>
  <rect x="835" y="455" width="95" height="60" fill="#8c8c8c" stroke="#fff" stroke-width="1.5"/>
  <g stroke="#e8e8e8" stroke-width="1">
    <line x1="845" y1="460" x2="845" y2="510"/><line x1="862" y1="460" x2="862" y2="510"/>
    <line x1="879" y1="460" x2="879" y2="510"/><line x1="896" y1="460" x2="896" y2="510"/>
    <line x1="913" y1="460" x2="913" y2="510"/>
  </g>
  <!-- star marker -->
  <polygon points="795,430 802,450 823,450 806,462 812,483 795,470 778,483 784,462 767,450 788,450"
           fill="#c0392b" stroke="#fff" stroke-width="1.2"/>
  <text x="795" y="415" class="rlblb" text-anchor="middle">CLUBHOUSE</text>
  <text x="882" y="535" fill="#20323c" font-size="12" text-anchor="middle" font-weight="bold">Parking</text>

  <!-- ===== STREET LABELS ===== -->
  <text x="132" y="360" class="rlblb" transform="rotate(90 132 360)">Discovery Bay Blvd</text>
  <text x="300" y="470" class="rlblb" transform="rotate(58 300 470)">Clubhouse Dr</text>
  <text x="700" y="560" class="rlblb">Clubhouse Dr</text>
  <text x="940" y="200" class="rlblb" transform="rotate(88 940 200)">Clubhouse Dr</text>
  <text x="352" y="200" class="rlbl" transform="rotate(80 352 200)">St Andrews Dr</text>
  <text x="1168" y="470" class="rlblb" transform="rotate(90 1168 470)">Cherry Hills Dr</text>
  <g class="rlbl">
    <text x="330" y="52">Emerald Ct</text>
    <text x="500" y="140">Fairway Ct</text>
    <text x="405" y="332">Hampton Ct</text>
    <text x="250" y="660">St Andrews Ct</text>
    <text x="852" y="110">Augusta Ct</text>
    <text x="1000" y="100">Oakmont Ct</text>
    <text x="855" y="415">Gateway Ct</text>
    <text x="1035" y="285">Greenfield Way</text>
    <text x="838" y="720">Pinehurst Ct</text>
    <text x="1005" y="770">Prestwick Dr</text>
    <text x="695" y="775">Wayfarer Ct</text>
    <text x="500" y="805">Azure Ct</text>
  </g>

  <!-- ===== TITLE / LEGEND / NORTH ===== -->
  <rect x="0" y="0" width="1300" height="30" fill="#20323c"/>
  <text x="14" y="21" fill="#fff" font-size="16" font-weight="bold">Discovery Bay — CLUBHOUSE &amp; GOLF CORE (street-level trace, north = up)</text>

  <g transform="translate(1255,60)">
    <polygon points="0,-24 9,9 0,2 -9,9" fill="#20323c"/>
    <text x="0" y="27" fill="#20323c" font-size="14" font-weight="bold" text-anchor="middle">N</text>
  </g>

  <g transform="translate(30,720)">
    <rect x="-8" y="-20" width="232" height="128" fill="#ffffff" opacity="0.85" rx="8"/>
    <text x="0" y="-2" fill="#20323c" font-size="14" font-weight="bold">LEGEND</text>
    <rect x="0" y="8" width="20" height="12" fill="#82b25c"/><text x="28" y="18" font-size="12" fill="#20323c">Golf fairway</text>
    <rect x="0" y="26" width="20" height="12" fill="#5199bd"/><text x="28" y="36" font-size="12" fill="#20323c">Pond / lagoon</text>
    <rect x="0" y="44" width="20" height="12" fill="#d9d0ac"/><text x="28" y="54" font-size="12" fill="#20323c">Housing land</text>
    <line x1="0" y1="66" x2="20" y2="66" stroke="#fff" stroke-width="6"/><text x="28" y="70" font-size="12" fill="#20323c">Road (thick = spine)</text>
    <rect x="2" y="80" width="16" height="10" fill="#b06a3a"/><text x="28" y="89" font-size="12" fill="#20323c">Clubhouse building</text>
  </g>
</svg>
